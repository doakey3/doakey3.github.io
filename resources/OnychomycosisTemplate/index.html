<textarea class="checkable resizable" spellcheck="false" autocomplete="off">
Onychomycosis Treatment Indicators: (more indicators supports use of oral/systemic therapy)
(    ) Diabetes mellitus
(    ) History of cellulitis
(    ) Venous insufficiency
(    ) Immunosuppressed patient
(    ) Discomfort or pain related to the affected nail
(    ) Cosmetic concerns

Oncychomycosis Severity:
(    ) Nail involvement &gt; 50%
(    ) Involvement of nail lunula

- Fungal culture of nail
- PAS stain of nail
- start terbinafine 250 mg by mouth daily for up to 12 weeks for toenail onychomycosis
- check baseline CMP
- recheck CMP at 6 weeks
- check CBC at 6 weeks in immunocompromised patients
- start ciclopirox 8% laquer solution, applied to affected nail daily after showering/bathing, every 7 days remove laquer with rubbing alcohol and file the surface of the nail down, continue use for up to 12 weeks
</textarea>
