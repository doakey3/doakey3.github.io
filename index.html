<html>
<head>
    <meta charset="utf-8">
    <meta name="HandheldFriendly" content="true"/>
    <meta name="MobileOptimized" content="320"/>
    <meta name="viewport" content="initial-scale=1.0, width=device-width, user-scalable=no;user-scalable=0;, maximum-scale=1"/>
    <title>doakey.com</title>
    <meta name="author" content="doakey3">
    <meta name="description" content="Air Force Family Medicine Resources used by Dr. Oakey.">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <input type="text" id="cleansoap_searchbar" class="scroll_searchbar" placeholder="Search..." autocomplete="off" autofocus>
    <div id="scroll_list_container" class="y-scrollable">
        <ul id="scroll_list" class="scroll_list"></ul>
    </div>
    
    <div id="science_block">
        <a id="questions_concerns">Questions? Concerns? &rarr;</a>
        <a href="https://github.com/doakey3/doakey3.github.io" id="github_link" target="_blank" title="Link to github page with all the source code for this site. Feel free to comment or contribute."></a>
    </div>
    <div id="hidden_message">
        <p>The code for this site is open-source. Feel free to visit the Github page by clicking the Octocat icon to the right.</p>
        <p>If you believe this site has a problem or could be improved in some way, feel free to submit an issue on the Github page.</p>
    </div>
</body>

<script src="js/links.js"></script>
<script src="js/search_dict.js"></script>
<script src="js/setup_searchbar.js"></script>
<script>
    document.getElementById("questions_concerns").onmouseenter = function(element) {
        document.getElementById("hidden_message").style.display = "block";
    }
    document.getElementById("questions_concerns").onmouseleave = function(element) {
        document.getElementById("hidden_message").style.display = "none";
    }
</script>

</html>
